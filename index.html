<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bruno Protocol — Postman to .bru Compiler</title>
  
  <link rel="icon" type="image/jpeg" href="/brand-logo.jpg">
  <link rel="shortcut icon" type="image/jpeg" href="/brand-logo.jpg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #050406;
      --void: #0a080d;
      --neon-amber: #ffaa00;
      --vibrant-gold: #ffcc33;
      --deep-copper: #d46a00;
      --silver: #cec9dc;
      --white: #f5f2fa;
      --biolume-green: #39ff14;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Goldenboy Unified Background Matrix Configuration */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 80% 20%, rgba(212, 106, 0, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 20% 80%, rgba(255, 170, 0, 0.05) 0%, transparent 50%),
        url("/brand-logo.jpg"),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: center 35%;
      background-size: auto 70vh; /* Scaled perfectly to dominate the center console */
      background-blend-mode: overlay;
      opacity: 0.12; /* Subtle, non-intrusive watermark presence */
      pointer-events: none;
      z-index: 0;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 40px;
      border-bottom: 1px solid rgba(255, 170, 0, 0.25);
      background: linear-gradient(180deg, var(--void) 0%, rgba(10, 8, 13, 0.8) 100%);
      backdrop-filter: blur(12px);
      position: relative;
      z-index: 10;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .nav-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 16px;
      letter-spacing: 0.25em;
      color: var(--vibrant-gold);
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 204, 51, 0.3);
    }

    .support-btn {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--black);
      background: linear-gradient(135deg, var(--vibrant-gold) 0%, var(--neon-amber) 100%);
      border: none;
      padding: 12px 24px;
      cursor: pointer;
      text-transform: uppercase;
      text-decoration: none;
      font-weight: bold;
      border-radius: 2px;
      box-shadow: 0 0 15px rgba(255, 170, 0, 0.3);
      transition: all 0.3s ease;
    }

    .support-btn:hover {
      box-shadow: 0 0 25px rgba(255, 204, 51, 0.6);
      transform: translateY(-1px);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 50px 20px;
      position: relative;
      z-index: 5;
    }

    .biolume-panel {
      background: rgba(10, 8, 13, 0.65); /* Augmented slightly for cleaner contrast over backdrop */
      border: 1px solid rgba(255, 170, 0, 0.15);
      padding: 35px;
      margin-bottom: 45px;
      border-radius: 8px;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .panel-title {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--vibrant-gold);
      margin-bottom: 24px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .panel-title.sustain {
      color: var(--biolume-green);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 35px;
      margin-bottom: 28px;
    }

    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
    }

    .panel-node {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .node-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .node-label {
      font-size: 11px;
      color: var(--silver);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .mini-copy-btn {
      background: rgba(255, 170, 0, 0.1);
      border: 1px solid rgba(255, 170, 0, 0.3);
      color: var(--vibrant-gold);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s ease;
    }

    .mini-copy-btn:hover {
      background: var(--neon-amber);
      color: var(--black);
      border-color: var(--vibrant-gold);
    }

    textarea {
      width: 100%;
      height: 340px;
      background: rgba(5, 4, 6, 0.85); /* Darkened to prevent any back-bleed from background image */
      border: 1px solid rgba(255, 170, 0, 0.2);
      border-radius: 4px;
      color: var(--white);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      padding: 18px;
      resize: none;
      outline: none;
    }

    textarea:focus {
      border-color: var(--vibrant-gold);
    }

    .pulse-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--neon-amber);
      color: var(--neon-amber);
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 16px;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
      transition: all 0.4s ease;
    }

    .pulse-btn:hover {
      background: linear-gradient(135deg, rgba(255, 170, 0, 0.15) 0%, rgba(214, 106, 0, 0.15) 100%);
      color: #ffffff;
      border-color: var(--vibrant-gold);
    }

    .control-group {
      margin-bottom: 28px;
    }

    .control-header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--silver);
      margin-bottom: 12px;
    }

    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      background: rgba(255, 170, 0, 0.1);
      height: 6px;
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, var(--vibrant-gold) 0%, var(--deep-copper) 100%);
      cursor: pointer;
      border-radius: 50%;
    }

    .results-row {
      display: flex;
      gap: 50px;
      border-top: 1px solid rgba(255, 170, 0, 0.15);
      padding-top: 28px;
      margin-top: 28px;
    }

    .result-metric {
      flex: 1;
    }

    .metric-val {
      font-size: 28px;
      color: var(--vibrant-gold);
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    .panel-title.sustain ~ .results-row .metric-val {
      color: var(--biolume-green);
    }

    .metric-lbl {
      font-size: 11px;
      color: var(--silver);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-brand">
      <span class="nav-title">Bruno Protocol</span>
    </a>
    <a href="https://ko-fi.com" target="_blank" class="support-btn">☕ Support Open Source</a>
  </nav>

  <div class="container">
    <section class="biolume-panel">
      <div class="panel-title">⚡ Neural Array Data Compiler</div>
      <div class="grid">
        <div class="panel-node">
          <div class="node-label-row">
            <label class="node-label">Source Postman Payload Array (JSON)</label>
          </div>
          <textarea id="input-json" placeholder="Paste your exported Postman collection structure directly here..."></textarea>
        </div>
        <div class="panel-node">
          <div class="node-label-row">
            <label class="node-label">Compiled Native Plain-Text (.bru)</label>
            <button class="mini-copy-btn" id="copy-btn">Copy Code</button>
          </div>
          <textarea id="output-bru" placeholder="The localized execution matrix will compile here..." readonly></textarea>
        </div>
      </div>
      <button class="pulse-btn" id="compile-trigger">⚡ Execute Matrix Conversion Loop ⚡</button>
    </section>

    <section class="biolume-panel">
      <div class="panel-title sustain">🌱 Eco-Compute Energy Management System</div>
      
      <div class="control-group">
        <div class="control-header">
          <span>Active Operations Engine Size</span>
          <span id="team-val" style="color: var(--vibrant-gold); font-weight: bold;">15 devs</span>
        </div>
        <input type="range" id="team-slider" min="1" max="200" value="15">
      </div>

      <div class="control-group">
        <div class="control-header">
          <span>Monthly Micro-Bus Queries Per Node</span>
          <span id="req-val" style="color: var(--vibrant-gold); font-weight: bold;">51,000 reqs</span>
        </div>
        <input type="range" id="req-slider" min="1000" max="200000" step="1000" value="51000">
      </div>

      <div class="results-row">
        <div class="result-metric">
          <span class="metric-val" id="carbon-val">94.30 kg CO₂e</span>
          <span class="metric-lbl">Prevented Carbon Overhead Offset</span>
        </div>
        <div class="result-metric">
          <span class="metric-val" id="tree-val" style="color: var(--biolume-green);">4 Mature Trees</span>
          <span class="metric-lbl">Environmental Absorption Equivalent</span>
        </div>
      </div>
    </section>
  </div>
