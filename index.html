<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bruno Protocol — Postman to .bru Compiler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #080608;
      --void: #0d0a10;
      --gold: #c9a84c;
      --pale-gold: #e8d5a3;
      --silver: #e2deee;
      --white: #f0edf5;
      --accent-green: #4caf50;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.5;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(201, 168, 76, 0.15);
      background: var(--void);
      position: relative;
      z-index: 10;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .nav-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 14px;
      letter-spacing: 0.2em;
      color: var(--pale-gold);
      text-transform: uppercase;
    }

    .cyber-guardian-logo {
      vertical-align: middle;
      margin-right: 14px;
      filter: drop-shadow(0 0 6px rgba(201, 168, 76, 0.2));
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .cyber-guardian-logo:hover {
      transform: scale(1.06);
      filter: drop-shadow(0 0 14px rgba(232, 213, 163, 0.6));
    }

    .cyber-guardian-logo:hover .initials-backbone {
      stroke: #ffffff;
    }

    .cyber-guardian-logo:hover .wireframe-contour {
      stroke: var(--pale-gold);
      opacity: 0.6;
    }

    .initials-backbone, .wireframe-contour, .hardware-nodes, .pcb-traces {
      transition: stroke 0.3s ease, fill 0.3s ease, opacity 0.3s ease;
    }

    .support-btn {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--black);
      background: var(--gold);
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      text-transform: uppercase;
      text-decoration: none;
      font-weight: bold;
      transition: opacity 0.2s ease;
    }

    .support-btn:hover {
      opacity: 0.85;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 5;
    }

    .compiler-section {
      background: var(--void);
      border: 1px solid rgba(201, 168, 76, 0.1);
      padding: 30px;
      margin-bottom: 40px;
      border-radius: 4px;
    }

    .compiler-title {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold);
      margin-bottom: 20px;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 24px;
    }

    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      nav { padding: 15px 20px; }
      .nav-title { font-size: 11px; }
    }

    .panel {
      display: flex;
      flex-direction: column;
    }

    .panel-label {
      font-size: 11px;
      color: var(--silver);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    textarea {
      width: 100%;
      height: 280px;
      background: rgba(8, 6, 8, 0.6);
      border: 1px solid rgba(201, 168, 76, 0.2);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      padding: 16px;
      resize: none;
      outline: none;
      transition: border-color 0.3s;
    }

    textarea:focus {
      border-color: var(--gold);
    }

    .compile-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .compile-btn:hover {
      background: var(--gold);
      color: var(--black);
    }

    .dashboard-section {
      background: var(--void);
      border: 1px solid rgba(201, 168, 76, 0.1);
      padding: 30px;
      border-radius: 4px;
    }

    .dashboard-title {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      color: var(--accent-green);
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }

    .control-group {
      margin-bottom: 24px;
    }

    .control-header {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--silver);
      margin-bottom: 10px;
    }

    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.05);
      height: 4px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--gold);
      cursor: pointer;
      border-radius: 50%;
    }

    .results-row {
      display: flex;
      gap: 40px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 24px;
      margin-top: 24px;
    }

    .result-metric {
      flex: 1;
    }

    .metric-val {
      font-size: 24px;
      color: var(--pale-gold);
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
    }

    .metric-lbl {
      font-size: 10px;
