name: Autonomous API Assertion Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-api-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Matrix From Git
        uses: actions/checkout@v4

      - name: Instantiate Node Core Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Inject Global Bruno Automation CLI
        run: npm install -g @usebruno/cli

      - name: Initialize Test Workspace Directory
        run: |
          mkdir -p tests
          cat << 'EOF' > bruno.json
          {
            "version": "1",
            "name": "Bruno Protocol Core",
            "type": "collection"
          }
          EOF
          cat << 'EOF' > tests/ping.bru
          meta {
            name: ping_validation
            type: http
            seq: 1
          }
          
          get {
            url: {{base_url}}/bearer
            body: none
            auth: bearer
          }
          
          auth:bearer {
            token: {{system_token}}
          }
          
          assert {
            res.status: eq 200
          }
          EOF

      - name: Execute Production Contract Assertions
        run: >
          bru run tests/
          --env Production
          --env-var system_token="${{ secrets.PROD_LIVE_BEARER_TOKEN }}"
          --env-var client_secret="${{ secrets.PROD_VAULT_PASSKEY }}"
