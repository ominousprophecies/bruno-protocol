name: Autonomous API Assertion Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-api-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Matrix From Git
        uses: actions/checkout@v4

      - name: Instantiate Node Core Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Inject Global Bruno Automation CLI
        run: npm install -g @usebruno/cli

      - name: Build Pristine Native Manifest
        run: |
          cat << 'EOF' > bruno.json
          {
            "version": "1",
            "name": "Bruno Protocol Core",
            "type": "collection"
          }
          EOF
          cp bruno.json ../ 2>/dev/null || true

      - name: Execute Production Contract Assertions
        run: >
          bru run bru run tests/
          --env Production
          --env-var system_token="${{ secrets.PROD_LIVE_BEARER_TOKEN }}"
          --env-var client_secret="${{ secrets.PROD_VAULT_PASSKEY }}"
