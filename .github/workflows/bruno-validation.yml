name: Autonomous API Assertion Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-api-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Matrix From Git
        uses: actions/checkout@v4

      - name: Instantiate Node Core Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Inject Global Bruno Automation CLI
        run: npm install -g @usebruno/cli

      # ==============================================================================
      # THIS IS WHERE THE NETWORK SEPARATION LOGIC LIVES
      # It pulls your keys securely from GitHub Secrets and passes them into the runner
      # ==============================================================================
      - name: Execute Production Contract Assertions
        run: |
          bru run bruno/ --env Production \
            --secret system_token="${{ secrets.PROD_LIVE_BEARER_TOKEN }}" \
            --secret client_secret="${{ secrets.PROD_VAULT_PASSKEY }}" \
            --output production-audit-log.html

      - name: Archive Compliance Validation Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-compliance-report
          path: production-audit-log.html
